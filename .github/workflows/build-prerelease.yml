name: Build Emby prerelease fnOS Package

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 8:00 (北京时间 16:00)
  workflow_dispatch:
    inputs:
      version:
        description: '预发布版本号 (留空则自动获取最新 pre-release)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Latest Prerelease Version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 查找包含 amd64.deb 的最新预发布版本
            VERSION=$(curl -fsSL "https://api.github.com/repos/MediaBrowser/Emby.Releases/releases" | python3 -c "import json, sys; releases = json.load(sys.stdin); print(next((r['tag_name'] for r in releases if r.get('prerelease') and any(a['name'] == f'emby-server-deb_{r['tag_name']}_amd64.deb' for a in r.get('assets', []))), ''))")
          fi

          if [ -z "$VERSION" ]; then
            echo "未找到 Emby pre-release 版本"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "检测到预发布版本: $VERSION"

      - name: Check if Release Exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "pre-${VERSION}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "预发布版本 $VERSION 已存在，跳过构建"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "预发布版本 $VERSION 不存在，开始构建"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Package
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_NAME="embyserver_${VERSION}_pre_amd64.fpk"

          echo "==> 下载 Emby Server pre-release $VERSION"
          curl -fL -o emby.deb "https://github.com/MediaBrowser/Emby.Releases/releases/download/${VERSION}/emby-server-deb_${VERSION}_amd64.deb"
          ls -lh emby.deb

          echo "==> 解压 deb"
          ar -x emby.deb
          mkdir -p extracted
          tar -xf data.tar.xz -C extracted
          du -sh extracted/opt/emby-server/*

          echo "==> 构建 app.tgz"
          mkdir -p app_root
          cp -a extracted/opt/emby-server/* app_root/
          mkdir -p app_root/config app_root/ui/images

          cp fnos/EmbyServer.sc app_root/
          cp fnos/config/* app_root/config/
          cp -a fnos/ui/* app_root/ui/
          cp fnos/bin/emby-server app_root/bin/emby-server
          chmod +x app_root/bin/emby-server

          du -sh app_root/*
          cd app_root && tar -czf ../app.tgz . && cd ..
          ls -lh app.tgz

          echo "==> 构建 fpk"
          CHECKSUM=$(md5sum app.tgz | cut -d' ' -f1)

          mkdir -p package
          mv app.tgz package/
          cp -a fnos/cmd fnos/config fnos/wizard fnos/ICON*.PNG package/

          sed "s/^version.*/version         = ${VERSION}/" fnos/manifest > package/manifest
          sed -i "s/^checksum.*/checksum        = ${CHECKSUM}/" package/manifest

          cd package && tar -czf ../${PACKAGE_NAME} * && cd ..

          echo "==> 完成"
          ls -lh "${PACKAGE_NAME}"

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_NAME="embyserver_${VERSION}_pre_amd64.fpk"
          gh release create "pre-${VERSION}" \
            --prerelease \
            --title "Emby Server ${VERSION} pre-release for fnOS" \
            --notes "自动构建的 fnOS 预发布安装包

          - 基于 [Emby Server ${VERSION}](https://github.com/MediaBrowser/Emby.Releases/releases/tag/${VERSION})
          - 类型: pre-release
          - 架构: x86_64 (amd64)
          - 平台: fnOS" \
            "${PACKAGE_NAME}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update FnDepot Metadata
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/pre-${VERSION}/embyserver_${VERSION}_pre_amd64.fpk"

          echo "Updating EmbyBeta metadata in FnDepot..."
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone "https://${{ secrets.RELEASE }}@github.com/${{ github.actor }}/FnDepot.git" fndepot-repo
          python3 - <<'PY'
          import pathlib
          import re

          path = pathlib.Path('fndepot-repo/fnpack.json')
          text = path.read_text(encoding='utf-8')
          version = "${{ steps.version.outputs.version }}"
          download_url = f"https://github.com/${{ github.repository }}/releases/download/pre-{version}/embyserver_{version}_pre_amd64.fpk"

          block_pattern = r'("EmbyBeta"\s*:\s*\{.*?\n\s*\})'
          match = re.search(block_pattern, text, re.S)
          if not match:
              raise SystemExit('EmbyBeta entry not found in fnpack.json')

          block = match.group(1)
          block = re.sub(r'("version"\s*:\s*")[^"]*(")', rf'\g<1>V{version}\2', block, count=1)
          block = re.sub(r'("download_url"\s*:\s*")[^"]*(")', rf'\g<1>{download_url}\2', block, count=1)
          text = text[:match.start()] + block + text[match.end():]
          path.write_text(text, encoding='utf-8')
          PY

          cd fndepot-repo
          git add fnpack.json
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "Update emby beta metadata to ${VERSION}"
            git push origin main
            echo "Successfully updated FnDepot metadata"
          fi
